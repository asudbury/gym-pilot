<!doctype html>
<html lang="en">
  <head>
    <script>
      const theme = localStorage.getItem('theme')

      if (
        theme === 'dark' ||
        (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)
      ) {
        document.documentElement.classList.add('dark')
      }
    </script>

    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <meta name="theme-color" content="#863bff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Gym-Pilot" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="%BASE_URL%app-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Prevent stale HTML from being reused -->
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- PWA settings -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Gym-Pilot</title>
  </head>
  <body>
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-P2QV3LZH5Y"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || []
      function gtag() {
        dataLayer.push(arguments)
      }
      gtag('js', new Date())

      // Store the default header height to restore it when exiting full screen
      let defaultHeaderHeight = 50 // A common default, or retrieve from gridOptions if available

      document.addEventListener('fullscreenchange', () => {
        // Find the AG Grid root element within the #root div
        const gridElement = document
          .getElementById('root')
          ?.querySelector('.ag-root-wrapper')
        if (!gridElement) {
          console.warn(
            'AG Grid element not found. Ensure the grid is rendered and has the class "ag-root-wrapper".',
          )
          return
        }
        // Assuming agGrid is globally available and getGridApi exists
        const gridApi = window.agGrid.getGridApi(gridElement)
        if (!gridApi) {
          console.warn(
            'AG Grid API not found. Ensure agGrid is loaded and the grid is initialized.',
          )
          return
        }

        if (document.fullscreenElement) {
          defaultHeaderHeight = gridApi.getGridOption('headerHeight') || 50 // Capture current height if it was customized
          gridApi.setGridOption('headerHeight', 0) // Hide header
        } else {
          gridApi.setGridOption('headerHeight', defaultHeaderHeight) // Restore header height
        }
      })
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
